<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  >

  <meta name="theme-color" content="#17121f">

  <title>GalactaKon Check-In</title>

  <script
    src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js">
  </script>

  <style>
    :root {
      --purple: #7137b8;
      --purple-dark: #4b217e;
      --background: #17121f;
      --card: #241b30;
      --card-light: #30243e;
      --text: #ffffff;
      --muted: #b9adca;
      --success: #16a34a;
      --success-dark: #0b672e;
      --danger: #dc2626;
      --danger-dark: #8f1515;
      --warning: #f59e0b;
      --warning-dark: #8b5700;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 14px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 12px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }

    .header p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .ready-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 50%;
      background: #35d56f;
      box-shadow: 0 0 8px rgba(53, 213, 111, 0.7);
    }

    .dashboard {
      margin-bottom: 12px;
      padding: 13px;
      border: 1px solid #443354;
      border-radius: 16px;
      background: var(--card);
    }

    .dashboard-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 11px;
    }

    .dashboard-title {
      font-size: 17px;
      font-weight: 900;
    }

    #refreshStatsButton {
      width: auto;
      min-height: 36px;
      margin: 0;
      padding: 8px 11px;
      background: var(--card-light);
      color: var(--text);
      font-size: 12px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      padding: 11px 6px;
      border: 1px solid #443354;
      border-radius: 11px;
      background: var(--card-light);
      text-align: center;
    }

    .stat-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .stat-value {
      margin-top: 5px;
      font-size: 22px;
      font-weight: 900;
    }

    .progress-track {
      height: 10px;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #15101c;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        var(--purple),
        #ae68ef
      );
      transition: width 0.35s ease;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .pass-list {
      display: grid;
      gap: 7px;
      margin-top: 12px;
    }

    .pass-row {
      padding: 10px;
      border: 1px solid #49385b;
      border-radius: 10px;
      background: #1d1626;
    }

    .pass-row-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .pass-name {
      font-size: 13px;
      font-weight: 800;
      text-align: left;
    }

    .pass-category {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      text-align: left;
    }

    .pass-count {
      white-space: nowrap;
      font-size: 14px;
      font-weight: 900;
    }

    .pass-progress-track {
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #0f0c14;
    }

    .pass-progress-bar {
      height: 100%;
      border-radius: inherit;
      background: var(--purple);
    }

    #statsUpdated {
      margin-top: 9px;
      color: var(--muted);
      font-size: 10px;
      text-align: center;
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 12px;
    }

    .scanner-card {
      padding: 14px;
      border: 1px solid #443354;
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
    }

    #reader {
      width: 100%;
      margin: 0 auto 12px;
      overflow: hidden;
      border-radius: 12px;
      background: #000000;
    }

    #reader video {
      border-radius: 12px;
    }

    button {
      width: 100%;
      min-height: 52px;
      margin-top: 9px;
      padding: 13px 15px;
      border: 0;
      border-radius: 10px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.99);
    }

    #startButton {
      background: linear-gradient(
        135deg,
        var(--purple),
        var(--purple-dark)
      );
    }

    #stopButton {
      display: none;
      background: #4b4354;
    }

    .manual-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #49385b;
    }

    .manual-title {
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
    }

    #ticketInput {
      width: 100%;
      padding: 14px;
      border: 1px solid #5a486c;
      border-radius: 10px;
      outline: none;
      background: var(--card-light);
      color: #ffffff;
      font-size: 16px;
    }

    #ticketInput::placeholder {
      color: #9d90ad;
    }

    #ticketInput:focus {
      border-color: #a86de8;
    }

    #manualButton {
      background: #ffffff;
      color: #24172f;
    }

    #resultCard {
      position: relative;
      min-height: 150px;
      margin-top: 14px;
      padding: 18px 15px;
      border: 1px solid #483857;
      border-radius: 15px;
      background: var(--card-light);
      text-align: center;
      transition:
        background 0.2s ease,
        transform 0.2s ease;
    }

    #resultCard.success {
      border-color: #34d66b;
      background: linear-gradient(
        145deg,
        var(--success),
        var(--success-dark)
      );
    }

    #resultCard.duplicate,
    #resultCard.invalid,
    #resultCard.error {
      border-color: #ff6868;
      background: linear-gradient(
        145deg,
        var(--danger),
        var(--danger-dark)
      );
    }

    #resultCard.working {
      border-color: #ffc64f;
      background: linear-gradient(
        145deg,
        var(--warning),
        var(--warning-dark)
      );
    }

    .result-icon {
      min-height: 42px;
      font-size: 39px;
      line-height: 1;
    }

    .result-title {
      margin-top: 8px;
      font-size: 27px;
      font-weight: 900;
      line-height: 1.05;
    }

    .result-ticket {
      margin-top: 11px;
      font-size: 20px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .result-pass {
      margin-top: 5px;
      font-size: 17px;
      font-weight: 700;
    }

    .result-time {
      margin-top: 9px;
      font-size: 13px;
      opacity: 0.9;
    }

    #lastScanned {
      margin-top: 9px;
      color: var(--muted);
      font-size: 10px;
      overflow-wrap: anywhere;
      text-align: center;
    }

    @media (max-width: 420px) {
      body {
        padding: 9px;
      }

      .header h1 {
        font-size: 24px;
      }

      .scanner-card {
        padding: 10px;
      }

      .result-title {
        font-size: 24px;
      }

      .stat-value {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <header class="header">
      <h1>🎟️ GalactaKon Check-In</h1>

      <p>
        <span class="ready-dot"></span>
        Live gate scanner
      </p>
    </header>

    <section class="dashboard">

      <div class="dashboard-heading">
        <div class="dashboard-title">
          Live Attendance
        </div>

        <button
          id="refreshStatsButton"
          type="button"
          onclick="fetchDashboardStats()"
        >
          ↻ REFRESH
        </button>
      </div>

      <div class="dashboard-grid">

        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div id="totalTickets" class="stat-value">—</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Checked In</div>
          <div id="totalCheckedIn" class="stat-value">—</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Remaining</div>
          <div id="totalRemaining" class="stat-value">—</div>
        </div>

      </div>

      <div class="progress-track">
        <div id="progressBar"></div>
      </div>

      <div class="progress-text">
        <span id="percentageText">Loading attendance…</span>
        <span id="attendanceFraction"></span>
      </div>

      <div id="passList" class="pass-list"></div>

      <div id="statsUpdated">
        Loading live statistics…
      </div>

    </section>

    <section class="top-bar">

      <div class="stat-card">
        <div class="stat-label">This Device</div>
        <div id="sessionCount" class="stat-value">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Scanner</div>
        <div id="scannerStatus" class="stat-value">Off</div>
      </div>

    </section>

    <section class="scanner-card">

      <div id="reader"></div>

      <button
        id="startButton"
        type="button"
        onclick="startCamera()"
      >
        📷 START LIVE CAMERA
      </button>

      <button
        id="stopButton"
        type="button"
        onclick="stopCamera()"
      >
        STOP CAMERA
      </button>

      <section class="manual-section">

        <div class="manual-title">
          Manual Ticket Entry
        </div>

        <input
          id="ticketInput"
          type="text"
          placeholder="Enter ticket ID or QR value"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        >

        <button
          id="manualButton"
          type="button"
          onclick="manualCheckIn()"
        >
          CHECK IN
        </button>

      </section>

      <section id="resultCard">

        <div id="resultIcon" class="result-icon">📷</div>

        <div id="resultTitle" class="result-title">
          Ready
        </div>

        <div id="resultTicket" class="result-ticket"></div>

        <div id="resultPass" class="result-pass">
          Tap START LIVE CAMERA
        </div>

        <div id="resultTime" class="result-time"></div>

      </section>

      <div id="lastScanned"></div>

    </section>

  </main>

  <script>
    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbwnc2fuOX6QDX2AjO7xI4Gt3UIhdK4LnTIckfYhaIVI1d5wFiiueRr9RQ9IqnyeR1Hc/exec";

    const RESULT_DISPLAY_TIME = 3000;
    const STATS_REFRESH_INTERVAL = 15000;

    let scanner = null;
    let cameraRunning = false;
    let scanLocked = false;
    let sessionCheckIns = 0;
    let audioContext = null;
    let statsRequestRunning = false;

    const resultCard =
      document.getElementById("resultCard");

    const resultIcon =
      document.getElementById("resultIcon");

    const resultTitle =
      document.getElementById("resultTitle");

    const resultTicket =
      document.getElementById("resultTicket");

    const resultPass =
      document.getElementById("resultPass");

    const resultTime =
      document.getElementById("resultTime");

    const lastScannedBox =
      document.getElementById("lastScanned");

    const ticketInput =
      document.getElementById("ticketInput");

    const startButton =
      document.getElementById("startButton");

    const stopButton =
      document.getElementById("stopButton");

    const scannerStatus =
      document.getElementById("scannerStatus");

    const sessionCountBox =
      document.getElementById("sessionCount");

    const totalTicketsBox =
      document.getElementById("totalTickets");

    const totalCheckedInBox =
      document.getElementById("totalCheckedIn");

    const totalRemainingBox =
      document.getElementById("totalRemaining");

    const progressBar =
      document.getElementById("progressBar");

    const percentageText =
      document.getElementById("percentageText");

    const attendanceFraction =
      document.getElementById("attendanceFraction");

    const passList =
      document.getElementById("passList");

    const statsUpdated =
      document.getElementById("statsUpdated");


    function getAudioContext() {
      if (!audioContext) {
        const AudioContextClass =
          window.AudioContext ||
          window.webkitAudioContext;

        if (AudioContextClass) {
          audioContext = new AudioContextClass();
        }
      }

      return audioContext;
    }


    function playTone(frequency, duration, type, delay) {
      const context = getAudioContext();

      if (!context) {
        return;
      }

      const oscillator = context.createOscillator();
      const gain = context.createGain();

      const startTime =
        context.currentTime + (delay || 0);

      oscillator.type = type || "sine";

      oscillator.frequency.setValueAtTime(
        frequency,
        startTime
      );

      gain.gain.setValueAtTime(
        0.0001,
        startTime
      );

      gain.gain.exponentialRampToValueAtTime(
        0.25,
        startTime + 0.02
      );

      gain.gain.exponentialRampToValueAtTime(
        0.0001,
        startTime + duration
      );

      oscillator.connect(gain);
      gain.connect(context.destination);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }


    function playSuccessSound() {
      playTone(660, 0.13, "sine", 0);
      playTone(880, 0.2, "sine", 0.14);
    }


    function playWarningSound() {
      playTone(310, 0.2, "square", 0);
      playTone(250, 0.25, "square", 0.22);
    }


    function playErrorSound() {
      playTone(180, 0.42, "sawtooth", 0);
    }


    function vibrate(pattern) {
      if ("vibrate" in navigator) {
        navigator.vibrate(pattern);
      }
    }


    function formatTime() {
      return new Date().toLocaleTimeString(
        [],
        {
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit"
        }
      );
    }


    function showReady(message) {
      resultCard.className = "";
      resultIcon.textContent = "📷";
      resultTitle.textContent = "Ready";
      resultTicket.textContent = "";

      resultPass.textContent =
        message ||
        "Position the QR inside the camera box.";

      resultTime.textContent = "";
    }


    function showWorking() {
      resultCard.className = "working";
      resultIcon.textContent = "⏳";
      resultTitle.textContent = "CHECKING";
      resultTicket.textContent = "";
      resultPass.textContent = "Verifying ticket…";
      resultTime.textContent = "";
    }


    function parseResponseMessage(message) {
      let cleaned = String(message || "").trim();

      cleaned = cleaned
        .replace(/^VALID:\s*/i, "")
        .replace(/^ALREADY USED:\s*/i, "");

      const parts = cleaned
        .split("—")
        .map(function(part) {
          return part.trim();
        })
        .filter(Boolean);

      return {
        ticketID: parts[0] || "",
        passName: parts[1] || "",
        category: parts[2] || "",
        extra: parts.slice(3).join(" — ")
      };
    }


    function showSuccess(message) {
      const details = parseResponseMessage(message);

      sessionCheckIns++;

      sessionCountBox.textContent =
        sessionCheckIns;

      resultCard.className = "success";
      resultIcon.textContent = "✓";
      resultTitle.textContent = "CHECKED IN";
      resultTicket.textContent = details.ticketID;

      resultPass.textContent =
        [details.passName, details.category]
          .filter(Boolean)
          .join(" • ") ||
        "Valid Ticket";

      resultTime.textContent =
        "Checked in at " + formatTime();

      playSuccessSound();
      vibrate(120);

      setTimeout(
        fetchDashboardStats,
        500
      );
    }


    function showDuplicate(message) {
      const details = parseResponseMessage(message);

      resultCard.className = "duplicate";
      resultIcon.textContent = "⚠";
      resultTitle.textContent = "ALREADY USED";
      resultTicket.textContent = details.ticketID;

      resultPass.textContent =
        [details.passName, details.category]
          .filter(Boolean)
          .join(" • ") ||
        "This ticket was already checked in.";

      resultTime.textContent =
        details.extra || formatTime();

      playWarningSound();
      vibrate([180, 90, 180]);
    }


    function showInvalid(message) {
      resultCard.className = "invalid";
      resultIcon.textContent = "✕";
      resultTitle.textContent = "INVALID TICKET";
      resultTicket.textContent = "";

      resultPass.textContent =
        message ||
        "Ticket could not be found.";

      resultTime.textContent =
        "Send guest to Registration.";

      playErrorSound();
      vibrate([250, 100, 250]);
    }


    function showSystemError(message) {
      resultCard.className = "error";
      resultIcon.textContent = "!";
      resultTitle.textContent = "SYSTEM ERROR";
      resultTicket.textContent = "";
      resultPass.textContent = message;

      resultTime.textContent =
        "Check the internet connection.";

      playErrorSound();
      vibrate([300, 100, 300]);
    }


    function releaseScannerLock(delay) {
      setTimeout(function() {
        scanLocked = false;

        if (cameraRunning) {
          showReady(
            "Position the next QR inside the camera box."
          );
        } else {
          showReady(
            "Tap START LIVE CAMERA."
          );
        }
      }, delay || RESULT_DISPLAY_TIME);
    }


    function cleanScannedValue(scannedValue) {
      let code = String(scannedValue || "")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .trim();

      if (
        (code.startsWith('"') && code.endsWith('"')) ||
        (code.startsWith("'") && code.endsWith("'"))
      ) {
        code = code.slice(1, -1).trim();
      }

      try {
        const decoded = decodeURIComponent(code);

        if (decoded) {
          code = decoded.trim();
        }
      } catch (error) {
        // Leave ordinary values unchanged.
      }

      if (
        code.includes("quickchart.io/qr") &&
        code.includes("text=")
      ) {
        try {
          const scannedUrl = new URL(code);

          const embeddedValue =
            scannedUrl.searchParams.get("text");

          if (embeddedValue) {
            code = decodeURIComponent(
              embeddedValue
            )
              .replace(
                /[\u200B-\u200D\uFEFF]/g,
                ""
              )
              .trim();
          }
        } catch (error) {
          console.log(
            "Could not extract QR value:",
            error
          );
        }
      }

      return code;
    }


    function sendCheckIn(scannedValue) {
      const code =
        cleanScannedValue(scannedValue);

      lastScannedBox.textContent =
        code
          ? "Last scanned: " + code
          : "";

      if (!code) {
        showInvalid(
          "Please scan or enter a ticket code."
        );

        releaseScannerLock(2500);
        return;
      }

      if (scanLocked) {
        return;
      }

      scanLocked = true;
      showWorking();

      const callbackName =
        "galactaCallback_" +
        Date.now() +
        "_" +
        Math.floor(Math.random() * 100000);

      const requestScript =
        document.createElement("script");

      const timeout = setTimeout(function() {
        cleanup();

        showSystemError(
          "The check-in request timed out."
        );

        releaseScannerLock(3500);
      }, 15000);


      function cleanup() {
        clearTimeout(timeout);

        if (requestScript.parentNode) {
          requestScript.parentNode.removeChild(
            requestScript
          );
        }

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }
      }


      window[callbackName] = function(response) {
        cleanup();

        const message =
          response && response.message
            ? String(response.message)
            : "ERROR: Empty response.";

        if (message.startsWith("VALID")) {
          showSuccess(message);

        } else if (
          message.startsWith("ALREADY USED")
        ) {
          showDuplicate(message);

        } else if (
          message.startsWith("INVALID")
        ) {
          showInvalid(message);

        } else {
          showSystemError(message);
        }

        ticketInput.value = "";

        releaseScannerLock(
          RESULT_DISPLAY_TIME
        );
      };


      requestScript.onerror = function() {
        cleanup();

        showSystemError(
          "Unable to contact the check-in system."
        );

        releaseScannerLock(3500);
      };


      requestScript.src =
        APPS_SCRIPT_URL +
        "?action=checkin" +
        "&code=" +
        encodeURIComponent(code) +
        "&callback=" +
        encodeURIComponent(callbackName) +
        "&t=" +
        Date.now();

      document.body.appendChild(
        requestScript
      );
    }


    function renderDashboard(data) {
      if (!data || data.success !== true) {
        statsUpdated.textContent =
          "Dashboard error: " +
          (
            data && data.error
              ? data.error
              : "No data received."
          );

        return;
      }

      const total =
        Number(data.total || 0);

      const checkedIn =
        Number(data.checkedIn || 0);

      const remaining =
        Number(data.remaining || 0);

      const percentage =
        Number(data.percentage || 0);

      totalTicketsBox.textContent = total;
      totalCheckedInBox.textContent = checkedIn;
      totalRemainingBox.textContent = remaining;

      progressBar.style.width =
        Math.max(
          0,
          Math.min(100, percentage)
        ) + "%";

      percentageText.textContent =
        percentage + "% checked in";

      attendanceFraction.textContent =
        checkedIn + " / " + total;

      passList.innerHTML = "";

      const passData =
        Array.isArray(data.byPass)
          ? data.byPass
          : [];

      passData.forEach(function(item) {
        const passTotal =
          Number(item.total || 0);

        const passCheckedIn =
          Number(item.checkedIn || 0);

        const passPercentage =
          passTotal > 0
            ? Math.round(
                passCheckedIn /
                passTotal *
                100
              )
            : 0;

        const row =
          document.createElement("div");

        row.className = "pass-row";

        const rowTop =
          document.createElement("div");

        rowTop.className = "pass-row-top";

        const details =
          document.createElement("div");

        const name =
          document.createElement("div");

        name.className = "pass-name";

        name.textContent =
          item.passName ||
          "Uncategorized";

        const category =
          document.createElement("div");

        category.className = "pass-category";

        category.textContent =
          item.category || "";

        details.appendChild(name);

        if (item.category) {
          details.appendChild(category);
        }

        const count =
          document.createElement("div");

        count.className = "pass-count";

        count.textContent =
          passCheckedIn +
          " / " +
          passTotal;

        rowTop.appendChild(details);
        rowTop.appendChild(count);

        const track =
          document.createElement("div");

        track.className =
          "pass-progress-track";

        const bar =
          document.createElement("div");

        bar.className =
          "pass-progress-bar";

        bar.style.width =
          passPercentage + "%";

        track.appendChild(bar);

        row.appendChild(rowTop);
        row.appendChild(track);

        passList.appendChild(row);
      });

      const updateTime = data.updatedAt
        ? new Date(data.updatedAt)
        : new Date();

      statsUpdated.textContent =
        "Last updated: " +
        updateTime.toLocaleTimeString(
          [],
          {
            hour: "numeric",
            minute: "2-digit",
            second: "2-digit"
          }
        );
    }


    function fetchDashboardStats() {
      if (statsRequestRunning) {
        return;
      }

      statsRequestRunning = true;

      const callbackName =
        "galactaStats_" +
        Date.now() +
        "_" +
        Math.floor(Math.random() * 100000);

      const requestScript =
        document.createElement("script");

      const timeout = setTimeout(function() {
        cleanupStatsRequest();

        statsUpdated.textContent =
          "Dashboard refresh timed out.";
      }, 15000);


      function cleanupStatsRequest() {
        clearTimeout(timeout);
        statsRequestRunning = false;

        if (requestScript.parentNode) {
          requestScript.parentNode.removeChild(
            requestScript
          );
        }

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }
      }


      window[callbackName] = function(data) {
        cleanupStatsRequest();
        renderDashboard(data);
      };


      requestScript.onerror = function() {
        cleanupStatsRequest();

        statsUpdated.textContent =
          "Unable to refresh attendance.";
      };


      requestScript.src =
        APPS_SCRIPT_URL +
        "?action=stats" +
        "&callback=" +
        encodeURIComponent(callbackName) +
        "&t=" +
        Date.now();

      document.body.appendChild(
        requestScript
      );
    }


    async function startCamera() {
      if (cameraRunning) {
        return;
      }

      const context = getAudioContext();

      if (
        context &&
        context.state === "suspended"
      ) {
        try {
          await context.resume();
        } catch (error) {
          console.log(error);
        }
      }

      if (
        typeof Html5Qrcode === "undefined"
      ) {
        showSystemError(
          "The QR scanner library did not load."
        );

        return;
      }

      showWorking();

      resultPass.textContent =
        "Requesting camera permission…";

      try {
        scanner = new Html5Qrcode(
          "reader"
        );

        await scanner.start(
          {
            facingMode: "environment"
          },
          {
            fps: 12,
            qrbox: {
              width: 240,
              height: 240
            },
            aspectRatio: 1
          },
          function(decodedText) {
            sendCheckIn(decodedText);
          },
          function() {
            // Normal while searching.
          }
        );

        cameraRunning = true;

        startButton.style.display = "none";
        stopButton.style.display = "block";

        scannerStatus.textContent = "Live";

        showReady(
          "Position the QR inside the camera box."
        );

      } catch (error) {
        scanner = null;
        cameraRunning = false;

        scannerStatus.textContent = "Error";

        const message =
          error && error.message
            ? error.message
            : String(error);

        showSystemError(
          "Camera error: " + message
        );
      }
    }


    async function stopCamera() {
      if (!scanner || !cameraRunning) {
        return;
      }

      try {
        await scanner.stop();
        await scanner.clear();
      } catch (error) {
        console.log(error);
      }

      scanner = null;
      cameraRunning = false;

      startButton.style.display = "block";
      stopButton.style.display = "none";

      scannerStatus.textContent = "Off";

      showReady(
        "Tap START LIVE CAMERA."
      );
    }


    function manualCheckIn() {
      sendCheckIn(
        ticketInput.value
      );
    }


    ticketInput.addEventListener(
      "keydown",
      function(event) {
        if (event.key === "Enter") {
          manualCheckIn();
        }
      }
    );


    window.addEventListener(
      "load",
      function() {
        showReady(
          "Tap START LIVE CAMERA."
        );

        fetchDashboardStats();

        setInterval(
          fetchDashboardStats,
          STATS_REFRESH_INTERVAL
        );
      }
    );
  </script>

</body>
</html>
